<div
  class="message-banner"
  [class.message-success]="type === 'success'"
  [class.message-error]="type === 'error'"
  [class.message-info]="type === 'info'"
  [attr.role]="role"
  [attr.aria-live]="ariaLive"
>
  <span class="message-icon" aria-hidden="true">
    <svg *ngIf="type === 'success'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <svg *ngIf="type === 'error'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
    <svg *ngIf="type === 'info'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
  </span>
  <p>{{ message }}</p>
</div>
