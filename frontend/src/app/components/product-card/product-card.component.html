<article class="product-card">
  <div class="product-image">
    <img [src]="producto.imagen" [alt]="producto.nombre" loading="lazy" />
    <span *ngIf="producto.categoria" class="product-category">{{ producto.categoria.nombre_categoria }}</span>
  </div>
  <div class="product-body">
    <h3 class="product-name">{{ producto.nombre }}</h3>
    <p class="product-desc" *ngIf="producto.descripcion">{{ producto.descripcion }}</p>
    <div class="product-footer">
      <span class="product-price">${{ producto.precio.toLocaleString('es-CL') }}</span>
      <button
        class="btn-add-cart"
        type="button"
        (click)="add.emit(producto)"
        [attr.aria-label]="'Agregar ' + producto.nombre + ' al carrito'"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar
      </button>
    </div>
  </div>
</article>
