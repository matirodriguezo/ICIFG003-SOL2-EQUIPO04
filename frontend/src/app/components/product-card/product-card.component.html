<article class="product-card">
  <img [src]="product.image" [alt]="product.name" />
  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p class="product-meta">Categoria: {{ product.category }}</p>
    <p class="product-price">${{ product.price.toLocaleString('es-CL') }}</p>
    <button
      class="btn btn-primary"
      type="button"
      (click)="add.emit(product)"
      [attr.aria-label]="'Agregar ' + product.name + ' al carrito'"
    >
      Agregar al carrito
    </button>
  </div>
</article>
