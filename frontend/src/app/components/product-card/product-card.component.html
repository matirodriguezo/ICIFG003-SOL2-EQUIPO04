<article class="product-card">
  <div class="product-image">
    <img [src]="producto.imagen" [alt]="producto.nombre" loading="lazy" />
    <span class="product-category">{{ producto.categoria.nombre_categoria }}</span>
  </div>
  <div class="product-body">
    <h3 class="product-name">{{ producto.nombre }}</h3>
    <p class="product-desc" *ngIf="producto.descripcion">{{ producto.descripcion }}</p>
    <div class="product-footer">
      <span class="product-price">${{ producto.precio.toLocaleString('es-CL') }}</span>
      <button
        class="btn-add-cart"
        type="button"
        (click)="add.emit(producto)"
        [attr.aria-label]="'Agregar ' + producto.nombre + ' al carrito'"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        Agregar
      </button>
    </div>
  </div>
</article>
