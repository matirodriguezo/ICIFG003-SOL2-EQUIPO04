<div class="cart-content">
  <app-message-banner
    *ngIf="items.length === 0"
    type="info"
    message="Tu carrito está vacío"
  ></app-message-banner>

  <div *ngIf="items.length > 0">
    <ul class="cart-list">
      <li *ngFor="let item of items" class="cart-item">
        <div class="cart-item-info">
          <h4 class="cart-item-name">{{ item.nombre }}</h4>
          <p class="cart-item-meta" *ngIf="item.quantity > 1">
            Cantidad: {{ item.quantity }}
          </p>
        </div>
        <div class="cart-item-right">
          <span class="cart-item-price">${{ (item.precio * item.quantity).toLocaleString('es-CL') }}</span>
          <button
            class="btn-remove"
            type="button"
            (click)="remove.emit(item.id)"
            [attr.aria-label]="'Eliminar ' + item.nombre + ' del carrito'"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </div>
      </li>
    </ul>

    <div class="cart-summary">
      <div class="cart-total">
        <span>Total</span>
        <strong>${{ total.toLocaleString('es-CL') }}</strong>
      </div>
      <button class="btn btn-success btn-block" type="button" (click)="checkout.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Finalizar Compra
      </button>
    </div>
  </div>
</div>
